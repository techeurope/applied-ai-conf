name: Sync Attio Partners to Spreadsheet

on:
  schedule:
    - cron: "15 */6 * * *" # Every 6 hours (offset from other syncs)
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - name: Sync Attio partners to Google Sheets
        run: node scripts/sync-attio-partners.mjs
        env:
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
